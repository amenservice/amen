    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
    <style>
        body { 
            background: #fdf6e3; 
            color: #333; 
            padding: 15px; 
            font-family: 'Courier Prime', monospace; 
            min-height: 95vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        
        .card { 
            width: 100%;
            max-width: 380px; 
            background: #fdf6e3; 
            box-sizing: border-box;
            padding: 10px;
        }
        
        .title-container { 
            text-align: center; 
            margin-bottom: 30px; 
        }
        
        .title-123 { 
            font-size: 2.1rem; 
            font-weight: 700; 
            margin: 0 0 5px 0; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            white-space: nowrap; 
        }
        
        .c-yellow { color: #f1c40f; }
        .c-green { color: #2ecc71; }
        .c-red { color: #e74c3c; }
        
        .title-lucky { 
            font-size: 1.1rem; 
            color: #555; 
            letter-spacing: 3px; 
        }
        
        input, button { 
            font-family: 'Courier Prime', monospace; 
            font-size: 1.1rem !important; 
            font-weight: bold; 
            box-sizing: border-box;
            height: 48px; 
            width: 100%; 
        }
        
        input {
            padding: 10px 12px; 
            border: 1px solid #777; 
            background: #fdf6e3;
        }

        .input-group {
            margin-bottom: 15px; 
        }
        
        #roundBtn {
            border: 1px solid #777; 
            background: #fdf6e3; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #addBtn { 
            background: #333; 
            color: white; 
            cursor: pointer; 
            border: none; 
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 5px;
        }

        #voucher { 
            background: #fdf6e3; 
            color: #333; 
            padding: 25px 20px; 
            display: none; 
            width: 100%;
            box-sizing: border-box;
            margin: 30px auto 20px auto; 
            text-align: center; 
            border: 1px solid #777; 
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1); 
        }
        
        .loading-status { 
            text-align: center; 
            font-size: 1.3rem; 
            color: #ff3333; 
            margin-bottom: 20px; 
            font-weight: bold; 
            letter-spacing: 2px;
        }

        #saveBtn {
            padding: 12px; 
            background: #777; 
            color: white; 
            display: none; 
            cursor: pointer; 
            border: none; 
            font-weight: bold;
        }

        .custom-alert-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; justify-content: center;
            align-items: center; z-index: 10000; padding: 20px; box-sizing: border-box;
        }
        .custom-alert-box {
            background: #fdf6e3; border: 2px solid #333; padding: 25px;
            max-width: 320px; width: 100%; text-align: center;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.15);
        }
        .custom-alert-msg {
            font-family: inherit; font-size: 1.1rem; font-weight: bold;
            color: #333; line-height: 1.6; margin-bottom: 20px; text-align: left;
        }
        .custom-alert-btn {
            background: #333; color: white; border: none; padding: 10px 25px;
            font-weight: bold; cursor: pointer; font-size: 1rem; width: auto; height: auto;
        }
    </style>
</head>
<body>

<div id="customAlert" class="custom-alert-overlay">
    <div class="custom-alert-box">
        <div id="customAlertMsg" class="custom-alert-msg"></div>
        <button class="custom-alert-btn" onclick="closeAlert()">OK</button>
    </div>
</div>

<div class="card">
    <div class="title-container">
        <h1 class="title-123">
            <span class="c-yellow">ONE</span>~<span class="c-green">TWO</span>~<span class="c-red">THREE</span>
        </h1>
        <div class="title-lucky">~ LUCKY ~</div>
    </div>

    <div id="status" class="loading-status">...</div>
    
    <div class="input-group">
        <input type="number" id="num" placeholder="Number (2-3)" oninput="if(this.value.length > 3) this.value = this.value.slice(0, 3);">
    </div>

    <div class="input-group">
        <button id="roundBtn" onclick="toggleRound()">Round</button>
    </div>
    
    <div class="input-group">
        <input type="number" id="amount" placeholder="Amount (5-500 Baht)" onkeypress="return event.charCode >= 48 && event.charCode <= 57">
    </div>
    
    <button id="addBtn" onclick="addToLedger()">Add Entry</button>

    <div id="voucher">
        <div style="font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap;">
            <span class="c-yellow">ONE</span>~<span class="c-green">TWO</span>~<span class="c-red">THREE</span>
        </div>
        <div style="font-size: 0.95rem; font-weight: bold; margin-bottom: 10px; color: #444;">2Dx65 | 3Dx90</div>
        <svg id="barcode"></svg>
        <table id="ledgerList" style="width:100%; border-collapse: collapse; margin-top:20px; font-size: 1.3rem; font-weight: bold;"></table>
        <div style="border-top: 2px dashed #777; margin: 20px 0;"></div>
        <div style="display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.1rem; gap: 10px;">
            <div id="dateDisplay" style="text-align: left; font-size: 0.95rem; max-width: 60%; line-height: 1.4;"></div>
            <div style="white-space: nowrap; text-align: right; font-size: 1.2rem;">Total: <span id="grandTotal">0</span></div>
        </div>
    </div>
    
    <button id="saveBtn" onclick="saveVoucher()">Save as Image</button>
</div>

<script>
    let isRound = false;
    let ledgerItems = [];
    let barcodeNumber = Math.floor(1000000000 + Math.random() * 9000000000).toString();
    
    let closed2D = []; 
    let closed3D = []; 

    const scriptUrl = 'https://script.google.com/macros/s/AKfycbw9MFGDcEHAiuN_OuvOW9gA0In1GbHCOXFn61SSUTNrRB55biewL55d5W2IFfsolMCA/exec';

    function showMyanmarAlert(msg) {
        document.getElementById('customAlertMsg').innerText = msg;
        document.getElementById('customAlert').style.display = 'flex';
    }

    function closeAlert() {
        document.getElementById('customAlert').style.display = 'none';
    }

    async function fetchAllClosedNumbers() {
        try {
            const response = await fetch(scriptUrl);
            const data = await response.json();
            
            closed2D = data.closed2D || [];
            closed3D = data.closed3D || [];

            const statusEl = document.getElementById('status');
            statusEl.innerText = "Live";
            statusEl.style.color = "#3498db"; 
            statusEl.style.letterSpacing = "1px";
        } catch (error) {
            console.error(error);
            const statusEl = document.getElementById('status');
            statusEl.innerText = "Connection Error";
            statusEl.style.color = "#ff3333"; 
            statusEl.style.letterSpacing = "1px";
        }
    }

    fetchAllClosedNumbers();

    function toggleRound() {
        isRound = !isRound;
        document.getElementById('roundBtn').style.background = isRound ? '#333' : '#fdf6e3';
        document.getElementById('roundBtn').style.color = isRound ? '#fff' : '#333';
    }

    function isDoubleNumber(numStr) {
        if (numStr.length === 2) {
            return numStr[0] === numStr[1];
        } else if (numStr.length === 3) {
            return numStr[0] === numStr[1] && numStr[1] === numStr[2];
        }
        return false;
    }

    function addToLedger() {
        let numInput = document.getElementById('num');
        let amtInput = document.getElementById('amount');
        let num = numInput.value;
        let amt = parseInt(amtInput.value);
        
        if (num.length < 2 || num.length > 3) return showMyanmarAlert("ဂဏန်းသည် ၂ လုံး သို့မဟုတ် ၃ လုံး ဖြစ်ရပါမည်။");
        if (!amt || amt < 5 || amt > 500) return showMyanmarAlert("ငွေပမာဏသည် ၅ ဘတ် မှ ၅၀၀ ဘတ် အတွင်း ဖြစ်ရပါမည်။");
        
        let checkNum = num;
        if(num.length === 2) {
            let parsed = parseInt(num).toString();
            checkNum = (parsed.length === 1) ? '0' + parsed : parsed;
            
            if (closed2D.includes(checkNum)) {
                return showMyanmarAlert(`ဂဏန်း (${num}) သည် လတ်တလောတွင် ဝယ်ယူ၍မရနိုင်သေးပါ။`);
            }
        } 
        else if(num.length === 3) {
            let parsed = parseInt(num).toString();
            if(parsed.length === 1) checkNum = '00' + parsed;
            else if(parsed.length === 2) checkNum = '0' + parsed;
            else checkNum = parsed;

            if (closed3D.includes(checkNum)) {
                return showMyanmarAlert(`ဂဏန်း (${num}) သည် လတ်တလောတွင် ဝယ်ယူ၍မရနိုင်သေးပါ။`);
            }
        }
        
        let localRound = isRound;
        if (isDoubleNumber(num)) {
            localRound = false; 
        }
        
        let displayNum = localRound ? num + " (R)" : num;
        let total = localRound ? amt * (num.length === 2 ? 2 : 6) : amt;
        ledgerItems.push({ num: displayNum, total: total });
        
        let list = document.getElementById('ledgerList');
        list.innerHTML += `<tr><td style="text-align:left; padding: 4px 0;">${displayNum}</td><td style="text-align:right; padding: 4px 0;">${amt} b</td></tr>`;
        
        let sum = ledgerItems.reduce((s, i) => s + i.total, 0);
        document.getElementById('grandTotal').innerText = sum.toLocaleString();
        
        document.getElementById('voucher').style.display = 'block';
        document.getElementById('saveBtn').style.display = 'block';
        
        numInput.value = "";
        amtInput.value = "";
        isRound = false;
        document.getElementById('roundBtn').style.background = '#fdf6e3';
        document.getElementById('roundBtn').style.color = '#333';
    }

    function saveVoucher() {
        const now = new Date();
        
        // နာရီ၊ မိနစ်၊ စက္ကန့် ပုံစံသတ်မှတ်ချက် (ဥပမာ - 14:30:15)
        const timeStr = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        
        // ရက်၊ လ၊ နှစ် ပုံစံသတ်မှတ်ချက် (ဥပမာ - 26/06/2026)
        const dateStr = now.toLocaleDateString('en-GB', { year: 'numeric', month: '2-digit', day: '2-digit' });
        
        // နာရီမိနစ်စက္ကန့်ကို အပေါ်တွင်ထားပြီး ရက်လနှစ်ကို အောက်တွင်ဖော်ပြရန် <br> ခံထားပါသည်
        document.getElementById('dateDisplay').innerHTML = `${timeStr}<br>${dateStr}`;
        
        JsBarcode("#barcode", barcodeNumber, { format: "CODE128", width: 2, height: 40, displayValue: true });
        html2canvas(document.getElementById('voucher')).then(canvas => {
            let link = document.createElement('a');
            link.download = 'Voucher.jpg';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
