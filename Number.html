<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᗩᗰᕮᑎ Number</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #fdf6e3; color: #333; padding: 15px; font-family: 'Courier Prime', monospace; min-height: 95vh; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .card { width: 100%; max-width: 380px; background: #fdf6e3; padding: 10px; box-sizing: border-box; }
        .brand-container { text-align: center; margin-bottom: 10px; }
        .brand-name { font-size: 2.2rem; font-weight: 900; color: #000; letter-spacing: 1px; }
        .sub-txt { font-size: 0.7rem; font-weight: normal; letter-spacing: 5px; color: #333; text-transform: uppercase; margin-top: -5px; }
        .input-row-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; width: 100%; }
        input, button { height: 48px; width: 100%; text-align: center; font-family: 'Courier Prime', monospace; font-weight: bold; border: 1px solid #777; background: #fdf6e3; box-sizing: border-box; }
        .card-btn { background: #333; color: white; border: none; cursor: pointer; width: 100%; margin-top: 5px; }
        .card-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        #voucher { background: #fdf6e3; padding: 20px; width: 100%; box-sizing: border-box; margin: 20px auto; text-align: center; border: 1px solid #777; box-shadow: 8px 8px 0px rgba(0,0,0,0.1); }
        .voucher-id { font-weight: bold; font-size: 1.1rem; margin: 10px auto; border: 1px solid #333; padding: 5px; display: block; width: 80%; box-sizing: border-box; }
        
        #ledgerList { width: 80%; margin: 15px auto; box-sizing: border-box; }
        .ledger-row { display: flex; align-items: baseline; font-weight: bold; padding: 2px 0; font-size: 0.9rem; }
        .left-side { flex-shrink: 0; display: flex; align-items: center; gap: 5px; }
        .dots { flex-grow: 1; border-bottom: 1px dotted #333; margin: 0 8px; height: 10px; }
        .amount-side { flex-shrink: 0; }
        
        .delete-btn { color: #d9534f; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        
        .footer-container { width: 80%; margin: 0 auto; white-space: nowrap; }
        .footer-total { font-size: 1.0rem; font-weight: bold; display: flex; justify-content: space-between; margin-top: 15px; border-top: 2px dashed #777; padding-top: 10px; }
        .footer-datetime { font-size: 0.75rem; color: #444; margin-top: 5px; text-align: center; font-weight: bold; }
        
        .custom-alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .custom-alert-box { background: #fdf6e3; border: 2px solid #333; padding: 25px; max-width: 300px; text-align: center; }
    </style>
</head>
<body>

<div id="customAlert" class="custom-alert-overlay">
    <div class="custom-alert-box">
        <div id="customAlertMsg" style="font-weight:bold; margin-bottom: 20px; line-height: 1.5;"></div>
        <button onclick="document.getElementById('customAlert').style.display='none'" style="padding: 10px 20px; cursor: pointer;">OK</button>
    </div>
</div>

<div class="card">
    <div class="brand-container">
        <div class="brand-name">ᗩᗰᕮᑎ®</div>
        <div class="sub-txt">~NUMBER~</div>
    </div>
    <div id="status" style="text-align:center; font-size: 0.8rem; margin-bottom: 15px; color: #ff3333;">...</div>
    <div class="input-row-grid">
        <input type="number" id="num" placeholder="No">
        <button id="roundBtn" onclick="toggleRound()">Round</button>
        <input type="number" id="amount" placeholder="Amt">
    </div>
    <button class="card-btn" onclick="addToLedger()">Add Entry</button>

    <div id="voucher">
        <div class="brand-container">
            <div class="brand-name">ᗩᗰᕮᑎ®</div>
            <div class="sub-txt">~NUMBER~</div>
        </div>
        <div class="voucher-id" id="vID">ID: --------</div>
        <div id="ledgerList"></div>
        <div class="footer-container">
            <div class="footer-total">
                <span>Total:</span>
                <span><span id="grandTotal">0</span> MMK</span>
            </div>
            <div id="fullDateTime" class="footer-datetime"></div>
        </div>
    </div>
    <button id="saveBtn" class="card-btn" onclick="saveVoucher()" disabled>Save as Image & Send Order</button>
</div>

<script>
    let isRound = false;
    let ledgerItems = [];
    let closed2D = [], closed3D = [];
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbw9MFGDcEHAiuN_OuvOW9gA0In1GbHCOXFn61SSUTNrRB55biewL55d5W2IFfsolMCA/exec';

    function generateID() {
        document.getElementById('vID').innerText = "ID: " + Math.floor(100000 + Math.random() * 900000);
    }

    function updateClock() {
        const now = new Date();
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const day = days[now.getDay()];
        const d = String(now.getDate()).padStart(2, '0');
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const y = now.getFullYear();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('fullDateTime').innerText = `${hh}:${mm}:${ss} ${day},${d},${m},${y}`;
    }

    function renderLedger(isExport = false) {
        let list = document.getElementById('ledgerList');
        list.innerHTML = "";
        ledgerItems.forEach((item, index) => {
            let deleteBtn = isExport ? "" : `<span class="delete-btn" onclick="deleteEntry(${index})">✕</span>`;
            list.innerHTML += `
                <div class="ledger-row">
                    <div class="left-side">${item.n}${item.isRound?'(R)':''} ${deleteBtn}</div>
                    <div class="dots"></div>
                    <div class="amount-side">${item.amt.toLocaleString()} MMK</div>
                </div>`;
        });
        document.getElementById('grandTotal').innerText = ledgerItems.reduce((s, i) => s + i.total, 0).toLocaleString();
        document.getElementById('saveBtn').disabled = ledgerItems.length === 0;
    }

    function deleteEntry(index) { ledgerItems.splice(index, 1); renderLedger(); }
    setInterval(updateClock, 1000); updateClock(); generateID();

    async function fetchData() {
        try { 
            const res = await fetch(scriptUrl); 
            const data = await res.json(); 
            closed2D = data.closed2D || []; 
            closed3D = data.closed3D || []; 
            document.getElementById('status').innerText = "Live"; 
            document.getElementById('status').style.color = "#2ecc71"; 
        } catch(e) { 
            document.getElementById('status').innerText = "OFFLINE"; 
        }
    }

    function toggleRound() {
        isRound = !isRound;
        document.getElementById('roundBtn').style.background = isRound ? '#333' : '#fdf6e3';
        document.getElementById('roundBtn').style.color = isRound ? '#fff' : '#333';
    }

    function getAllPermutations(n) {
        if (n.length < 2) return [n];
        let perms = [];
        for (let i = 0; i < n.length; i++) {
            let char = n[i];
            let remaining = n.slice(0, i) + n.slice(i + 1);
            for (let subPerm of getAllPermutations(remaining)) {
                perms.push(char + subPerm);
            }
        }
        return [...new Set(perms)];
    }

    function addToLedger() {
        let n = document.getElementById('num').value;
        let a = parseInt(document.getElementById('amount').value);
        
        let permutations = getAllPermutations(n);
        let conflict = ledgerItems.find(item => permutations.includes(item.n) || (isRound && item.isRound && permutations.some(p => p === item.n)));
        
        if (conflict) { 
            document.getElementById('customAlertMsg').innerText = "Number or its permutation already exists."; 
            document.getElementById('customAlert').style.display = 'flex'; 
            return; 
        }

        if (n.length !== 2 && n.length !== 3) { document.getElementById('customAlertMsg').innerText = "Invalid length."; document.getElementById('customAlert').style.display = 'flex'; return; }
        if (!n || !a) return;
        if (a < 5000 || a > 100000) { document.getElementById('customAlertMsg').innerText = "Amount 5,000 - 100,000."; document.getElementById('customAlert').style.display = 'flex'; return; }
        if ((n.length === 2 && closed2D.includes(n)) || (n.length === 3 && closed3D.includes(n))) { document.getElementById('customAlertMsg').innerText = "Number blocked."; document.getElementById('customAlert').style.display = 'flex'; return; }
        
        let hasTwoDigitsSame = (n.length === 3 && (n[0] === n[1] || n[1] === n[2] || n[0] === n[2]));
        let isTriple = (n.length === 3 && n[0] === n[1] && n[1] === n[2]);
        let isPair = (n.length === 2 && n[0] === n[1]);
        
        let multiplier = 1;
        if (isRound && !isPair && !isTriple) {
            multiplier = (n.length === 2) ? 2 : (hasTwoDigitsSame ? 3 : 6);
        }
        
        let total = a * multiplier;
        ledgerItems.push({ n, amt: a, total, isRound: (isRound && !isPair && !isTriple) });
        renderLedger();
        document.getElementById('num').value = ""; document.getElementById('amount').value = "";
    }

    function saveVoucher() {
        generateID(); renderLedger(true);
        setTimeout(() => {
            html2canvas(document.getElementById('voucher')).then(c => { 
                let link = document.createElement('a'); link.download = 'Voucher.jpg'; link.href = c.toDataURL(); link.click(); 
                renderLedger(false); window.open('https://t.me/amenmobilemoneyagent', '_blank');
            });
        }, 100);
    }
    fetchData();
</script>
</body>
</html>
