<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ᗩᗰᕮᑎ Money App</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --card-bg: #f8fafc; 
            --glow-blue: #00c6ff;
            --glow-purple: #0072ff;
            --title-clr: #1e293b;
            --messenger-clr: #0084ff; 
            --viber-clr: #7360f2; 
            --telegram-clr: #229ED9; 
            --whatsapp-clr: #25D366;
            --line-clr: #06C755; 
            --neon-border: #e2e8f0; 
            --focus-border: #0072ff;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Courier Prime', monospace; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            width: 100vw;
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
            overflow: hidden;
        }

        .card { 
            width: 100%; 
            max-width: 410px; 
            height: 96%; 
            max-height: 760px; 
            border-radius: 40px; 
            padding: 10px; 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 20px 20px 60px #d1d9e6, -20px -20px 60px #ffffff;
            display: flex;
            position: relative;
        }
        
        .card-inner { 
            background: var(--card-bg); 
            border-radius: 32px; 
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            padding: 35px 24px 25px 24px; 
            justify-content: space-between;
            box-shadow: inset 5px 5px 10px #e6eef8, inset -5px -5px 10px #ffffff;
        }

        .money-top-section { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .money-middle-section { width: 100%; display: flex; flex-direction: column; justify-content: center; padding: 5px 0; }
        .money-bottom-section { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; padding-bottom: 5px; }
        
        .header-container { display: inline-block; text-align: left; position: relative; margin: 0 auto; }
        
        .logo-wrapper { display: flex; align-items: flex-start; justify-content: flex-start; }
        
        .money-app h1 { 
            font-size: 4.8rem; 
            color: var(--title-clr); 
            font-family: 'MedievalSharp'; 
            margin: 0; 
            line-height: 0.95; 
            letter-spacing: 2px; 
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1)); 
        }
        
        .money-app h1 sup { font-size: 0.4em; font-weight: normal; font-family: 'Courier Prime', monospace; color: #94a3b8; margin-left: -3px; position: relative; top: -0.25em; }
        
        .agent-title { 
            font-size: 0.65rem; 
            margin-top: 8px; 
            font-weight: 700; 
            display: flex; 
            justify-content: space-between; 
            text-transform: uppercase; 
            font-family: 'Courier Prime', monospace;
            color: var(--title-clr);
            width: 100%;
            white-space: nowrap;
        }

        /* Custom text colors for MOBILE MONEY AGENT */
        .agent-title .clr-mobile { color: #ca8a04; } /* နောက်ခံအလင်းမှာ မြင်သာစေမည့် ရွှေဝါရောင် */
        .agent-title .clr-money { color: #06C755; }  /* App နဲ့ လိုက်ဖက်မည့် အစိမ်းရောင် */
        .agent-title .clr-agent { color: #dc2626; }  /* တောက်ပသော အနီရောင် */
        
        #status-light { font-size: 0.8rem; color: #64748b; margin: 22px auto 0 auto; background: #edf2f7; border-radius: 20px; padding: 6px 20px; display: flex; align-items: center; gap: 8px; font-weight: bold; letter-spacing: 1px; box-shadow: 3px 3px 6px #d1d9e6, inset -2px -2px 5px #ffffff; font-family: 'Courier Prime', monospace; }
        
        .tabs { display: flex; background: #eef2f7; padding: 6px; border-radius: 20px; margin-bottom: 25px; box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff; }
        .tab { flex: 1; padding: 14px 5px; text-align: center; font-weight: 700; color: #64748b; font-size: 0.85rem; cursor: pointer; border-radius: 15px; transition: all 0.3s ease; font-family: 'Courier Prime', monospace; }
        .tab.active { color: #ffffff; background: linear-gradient(135deg, var(--glow-blue), var(--glow-purple)); box-shadow: 0 10px 20px rgba(0, 114, 255, 0.2), 4px 4px 10px #d1d9e6; }
        
        .content { display: none; } .content.active { display: block; }
        
        .money-input-box { border-radius: 24px; background: #f0f4f9; margin-bottom: 22px; padding: 16px 20px; border: 1px solid rgba(255,255,255,0.8); transition: all 0.3s ease; box-shadow: 6px 6px 12px #d1d9e6, -6px -6px 12px #ffffff; }
        .money-input-box:focus-within, .money-input-box.highlighted { border-color: var(--focus-border); box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff; background: #f8fafc; }
        
        .money-input-box input { 
            width: 100%; 
            border: none; 
            background: transparent; 
            font-size: 2.2rem; 
            text-align: right; 
            font-weight: bold; 
            color: #1e293b; 
            outline: none; 
            font-family: 'Courier Prime', monospace;
        }
        .money-app label { display: block; margin-bottom: 12px; font-weight: 700; color: #64748b; font-size: 0.8rem; text-align: left; padding-left: 6px; letter-spacing: 0.5px; font-family: 'Courier Prime', monospace; text-transform: uppercase; }
        
        .social-container { display: flex; justify-content: space-evenly; align-items: center; width: 100%; background: #eef2f7; padding: 14px 10px; border-radius: 24px; box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff; }
        
        .social-icon { 
            font-size: 2rem; 
            transition: all 0.4s cubic-bezier(0.68, -0.6, 0.32, 1.6); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 48px; 
            height: 48px; 
            background: transparent; 
            border: none !important; 
            outline: none !important;
            text-decoration: none !important; 
            position: relative; 
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.15));
        }
        .social-icon * { text-decoration: none !important; border: none !important; }
        .social-icon::before, .social-icon::after, .social-icon i::before, .social-icon i::after { text-decoration: none !important; }
        
        .messenger { color: var(--messenger-clr); }
        .viber { color: var(--viber-clr); }
        .telegram { color: var(--telegram-clr); }
        .whatsapp { color: var(--whatsapp-clr); }
        .line { color: var(--line-clr); }

        .messenger:hover { transform: translateY(-10px) scale(1.35) rotate(-15deg); filter: drop-shadow(0 10px 16px rgba(0, 132, 255, 0.45)); }
        .viber:hover { transform: translateY(-10px) scale(1.35) rotate(15deg); filter: drop-shadow(0 10px 16px rgba(115, 96, 242, 0.45)); }
        .telegram:hover { transform: translateY(-14px) scale(1.35) rotate(-8deg); filter: drop-shadow(0 10px 16px rgba(34, 158, 217, 0.45)); }
        .whatsapp:hover { transform: translateY(-10px) scale(1.35) rotate(22deg); filter: drop-shadow(0 10px 16px rgba(37, 211, 102, 0.45)); }
        .line:hover { transform: translateY(-14px) scale(1.35) rotate(-20deg); filter: drop-shadow(0 10px 16px rgba(6, 199, 85, 0.45)); }
        
        .footer-clean { font-size: 0.75rem; font-weight: bold; color: #94a3b8; letter-spacing: 0.5px; display: block; text-align: center; width: 100%; font-family: 'Courier Prime', monospace; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card money-app">
    <div class="card-inner">
        
        <div class="money-top-section">
            <div class="header-container">
                <div class="logo-wrapper">
                    <h1>ᗩᗰᕮᑎ</h1>
                    <h1><sup>®</sup></h1>
                </div>
                <div class="agent-title">
                    <span class="clr-mobile">M</span><span class="clr-mobile">O</span><span class="clr-mobile">B</span><span class="clr-mobile">I</span><span class="clr-mobile">L</span><span class="clr-mobile">E</span><span class="clr-money">M</span><span class="clr-money">O</span><span class="clr-money">N</span><span class="clr-money">E</span><span class="clr-money">Y</span><span class="clr-agent">A</span><span class="clr-agent">G</span><span class="clr-agent">E</span><span class="clr-agent">N</span><span class="clr-agent">T</span>
                </div>
            </div>
            <div id="status-light">Loading</div>
        </div>
        
        <div class="money-middle-section">
            <div class="tabs">
                <div class="tab active" onclick="openTab(event, 'buy')">THB to MMK</div>
                <div class="tab" onclick="openTab(event, 'sell')">MMK to THB</div>
            </div>

            <div style="padding: 0 5px;">
                <div id="buy" class="content active">
                    <label>Amount {THB}</label>
                    <div class="money-input-box"><input type="text" id="thbBuy" placeholder="0" inputmode="decimal"></div>
                    <label>Amount {MMK}</label>
                    <div class="money-input-box"><input type="text" id="mmkBuy" placeholder="0" inputmode="decimal"></div>
                </div>
                
                <div id="sell" class="content">
                    <label>Amount {MMK}</label>
                    <div class="money-input-box"><input type="text" id="mmkSell" placeholder="0" inputmode="decimal"></div>
                    <label>Amount {THB}</label>
                    <div class="money-input-box"><input type="text" id="thbSell" placeholder="0" inputmode="decimal"></div>
                </div>
            </div>
        </div>

        <div class="money-bottom-section">
            <div class="social-container">
                <a href="https://m.me/MobileMoneyAgent" class="social-icon messenger"><i class="fa-brands fa-facebook-messenger"></i></a>
                <a href="viber://chat?number=%2B66947841411" class="social-icon viber"><i class="fa-brands fa-viber"></i></a>
                <a href="https://t.me/amenmobilemoneyagent" class="social-icon telegram"><i class="fa-brands fa-telegram"></i></a>
                <a href="https://api.whatsapp.com/send?phone=66947841411" class="social-icon whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="https://line.me/ti/p/~mobilemoneyagent" class="social-icon line"><i class="fa-brands fa-line"></i></a>
            </div>
            <span class="footer-clean">Mobile Money Agent © 2026</span>
        </div>

    </div>
</div>

<script>
    const MONEY_API = 'https://script.google.com/macros/s/AKfycbzELl1tVZ-b5nDWUmqdb1j13Vo_SSlSYUdPhL0NO9zfmRC0mZmqA8X9BEmFHoIk-faTYQ/exec';
    let SETTINGS = { buyBase: 780, sellBase: 760 };
    let lastActiveInput = null;

    async function syncMoneyData() {
        try {
            const res = await fetch(`${MONEY_API}?cache=${Date.now()}`);
            const data = await res.json();
            let isRateChanged = false;
            if (data.buyBase && parseFloat(data.buyBase) !== SETTINGS.buyBase) { SETTINGS.buyBase = parseFloat(data.buyBase); isRateChanged = true; }
            if (data.sellBase && parseFloat(data.sellBase) !== SETTINGS.sellBase) { SETTINGS.sellBase = parseFloat(data.sellBase); isRateChanged = true; }
            
            const statusLight = document.getElementById('status-light');
            statusLight.innerHTML = 'Live'; statusLight.style.color = '#0d9488';
            if (isRateChanged && lastActiveInput) { lastActiveInput.dispatchEvent(new Event('input')); }
        } catch (e) {
            const statusLight = document.getElementById('status-light');
            statusLight.innerHTML = 'Offline'; statusLight.style.color = '#e11d48';
        }
    }
    syncMoneyData(); setInterval(syncMoneyData, 1000);

    const format = (v, isTyping = false) => {
        if (!v && v !== 0) return "";
        let parts = v.toString().split(".");
        parts[0] = parts[0].replace(/,/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        if (parts.length > 1) return parts[0] + "." + parts[1];
        return parts[0] + (isTyping && v.toString().includes(".") ? "." : "");
    };
    const raw = (v) => parseFloat(v.toString().replace(/,/g, "")) || 0;

    function getSmoothMultiplier(mmkAmount, isBuyTab) {
        let percentage = 1.0;
        if (mmkAmount <= 100000) percentage = 1.0;
        else if (mmkAmount >= 150000000) percentage = 0.25;
        else {
            let ratio = (mmkAmount - 100000) / (150000000 - 100000);
            percentage = 1.0 - (ratio * (1.0 - 0.25));
        }
        return isBuyTab ? (1.0 + (percentage/100)) : (1.0 - (percentage/100));
    }

    function updateGlow(inputEl, hasValue) {
        let parentContent = inputEl.closest('.content');
        if (parentContent) {
            parentContent.querySelectorAll('.money-input-box').forEach(box => {
                hasValue ? box.classList.add('highlighted') : box.classList.remove('highlighted');
            });
        }
    }
    
    function handleTHBInput(inputEl, outputId, baseRate, isBuy) {
        lastActiveInput = inputEl; let thb = raw(inputEl.value); 
        inputEl.value = format(inputEl.value, true);
        if (!inputEl.value) { document.getElementById(outputId).value = ""; updateGlow(inputEl, false); return; }
        updateGlow(inputEl, true);
        let roughMMK = (thb / baseRate) * 100000;
        let baseTHB = thb / getSmoothMultiplier(roughMMK, isBuy);
        document.getElementById(outputId).value = format(Math.floor((baseTHB / baseRate) * 100000));
    }

    function handleMMKInput(inputEl, outputId, baseRate, isBuy) {
        lastActiveInput = inputEl; let mmk = raw(inputEl.value); 
        inputEl.value = format(inputEl.value, true);
        if (!inputEl.value) { document.getElementById(outputId).value = ""; updateGlow(inputEl, false); return; }
        updateGlow(inputEl, true);
        let baseTHB = (mmk / 100000) * baseRate;
        document.getElementById(outputId).value = format(parseFloat((baseTHB * getSmoothMultiplier(mmk, isBuy)).toFixed(2)));
    }

    document.getElementById('thbBuy').oninput = function() { handleTHBInput(this, 'mmkBuy', SETTINGS.buyBase, true); };
    document.getElementById('mmkBuy').oninput = function() { handleMMKInput(this, 'thbBuy', SETTINGS.buyBase, true); };
    document.getElementById('mmkSell').oninput = function() { handleMMKInput(this, 'thbSell', SETTINGS.sellBase, false); };
    document.getElementById('thbSell').oninput = function() { handleTHBInput(this, 'mmkSell', SETTINGS.sellBase, false); };

    function openTab(e, name) {
        document.querySelectorAll('.content').forEach(c => { c.classList.remove('active'); c.querySelectorAll('.money-input-box').forEach(b => b.classList.remove('highlighted')); });
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        e.currentTarget.classList.add('active');
        lastActiveInput = null;
    }
</script>
</body>
</html>
