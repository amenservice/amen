<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>ᗩᗰᕮᑎ Money</title>
    <meta property="og:title" content="ᗩᗰᕮᑎ Money">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --card-bg: #f8fafc; 
            --glow-blue: #00c6ff;
            --glow-purple: #0072ff;
            --title-clr: #1e293b;
            --messenger-clr: #0084ff; 
            --viber-clr: #7360f2; 
            --telegram-clr: #229ED9; 
            --whatsapp-clr: #25D366;
            --line-clr: #06C755; 
            --focus-border: #0072ff;
            --vv-height: 100vh;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Courier Prime', monospace; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: var(--vv-height); 
            height: var(--vv-height);
            width: 100vw;
            padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom) 12px;
            overflow: hidden; 
        }

        .card { 
            width: 100%; 
            max-width: 380px; 
            height: 96%; 
            max-height: 720px; 
            border-radius: 32px; 
            padding: 6px; 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 15px 15px 40px #d1d9e6, -15px -15px 40px #ffffff;
            display: flex;
            margin: auto; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .card-inner { 
            background: var(--card-bg); 
            border-radius: 26px; 
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            padding: 30px 24px; 
            justify-content: space-evenly; 
            align-items: center;
            box-shadow: inset 4px 4px 8px #e6eef8, inset -4px -4px 8px #ffffff;
            transition: all 0.3s ease;
        }

        .logo-row {
            width: 100%;
            max-width: 290px;
            text-align: center;
            transition: all 0.25s ease;
        }
        
        .money-app h1 { 
            font-size: 3.8rem; 
            color: #273549; 
            font-family: 'MedievalSharp'; 
            margin: 0; 
            line-height: 0.95; 
            letter-spacing: 2px; 
            text-shadow: 1px 1px 0px #ffffff;
        }
        
        .agent-title { 
            font-size: 0.65rem; 
            margin-top: 8px; 
            font-weight: 700; 
            display: flex; 
            justify-content: center; 
            gap: 7px; 
            text-transform: uppercase; 
            color: var(--title-clr);
            width: 100%;
            white-space: nowrap;
            padding: 0 2px;
        }

        .agent-title .clr-mobile { color: #ca8a04; }
        .agent-title .clr-money { color: #06C755; }
        .agent-title .clr-agent { color: #dc2626; }
        
        #status-light { 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            transition: all 0.25s ease;
        }

        .clock-time {
            font-size: 1.7rem; 
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.1;
        }

        .clock-date {
            font-size: 0.65rem; 
            font-weight: 700;
            color: #64748b;
            margin-top: 3px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .tabs { 
            width: 100%;
            display: flex; 
            background: #ebf0f6; 
            padding: 5px; 
            border-radius: 50px; 
            box-shadow: inset 3px 3px 6px #cbd5e1, inset -3px -3px 6px #ffffff;
        }
        .tab { 
            flex: 1; 
            padding: 12px 4px; 
            text-align: center; 
            font-weight: 700; 
            color: #64748b; 
            font-size: 0.78rem; 
            cursor: pointer; 
            border-radius: 50px; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            letter-spacing: 0.3px;
        }
        .tab:active {
            transform: scale(0.95);
        }
        .tab.active { 
            color: #ffffff; 
            background: linear-gradient(135deg, #0084ff, #0052d4); 
            box-shadow: 0 4px 12px rgba(0, 82, 212, 0.3); 
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .inputs-container {
            width: 100%;
        }
        
        .content { display: none; width: 100%; } 
        .content.active { 
            display: flex; 
            flex-direction: column;
            gap: 24px; 
        }
        
        .money-input-box { 
            background: transparent;
            border: none;
            border-bottom: 2px solid #cbd5e1; 
            border-radius: 0; 
            padding: 6px 2px; 
            transition: all 0.3s ease; 
        }
        .money-input-box:focus-within, .money-input-box.highlighted { 
            border-bottom-color: var(--focus-border); 
        }
        
        .money-input-box input { 
            width: 100%; 
            border: none; 
            background: transparent; 
            font-size: 1.8rem; 
            text-align: right; 
            font-weight: bold; 
            color: #1e293b; 
            outline: none; 
            font-family: 'Courier Prime', monospace;
        }
        .money-app label { display: block; font-weight: 700; color: #64748b; font-size: 0.72rem; text-align: left; padding-left: 2px; letter-spacing: 0.5px; text-transform: uppercase; }
        
        .social-container { 
            display: flex; 
            justify-content: space-evenly; 
            align-items: center; 
            width: 100%; 
            max-width: 320px;
            transition: all 0.25s ease;
        }
        
        .social-icon { 
            font-size: 1.85rem; 
            transition: all 0.3s ease; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 44px; 
            height: 44px; 
            background: transparent; 
            text-decoration: none !important; 
        }
        .social-icon * { text-decoration: none !important; border: none !important; }
        
        .messenger { color: var(--messenger-clr); }
        .viber { color: var(--viber-clr); }
        .telegram { color: var(--telegram-clr); }
        .whatsapp { color: var(--whatsapp-clr); }
        .line { color: var(--line-clr); }
        .social-icon:hover { transform: translateY(-4px) scale(1.15); }
        
        .footer-clean { font-size: 0.68rem; font-weight: bold; color: #94a3b8; letter-spacing: 0.5px; display: block; text-align: center; width: 100%; text-transform: uppercase; transition: all 0.25s ease; }

        @media (max-height: 650px) {
            .card-inner { padding: 20px 20px; }
            .money-app h1 { font-size: 2.8rem; }
            .agent-title { font-size: 0.55rem; margin-top: 4px; gap: 2px; }
            .clock-time { font-size: 1.4rem; }
            .tab { padding: 9px 2px; font-size: 0.72rem; }
            .content.active { gap: 12px; }
            .money-input-box input { font-size: 1.5rem; }
            .social-icon { font-size: 1.6rem; width: 38px; height: 38px; }
        }

        /* --- LATEST AUTO-SHRINK TECHNIQUE FOR KEYBOARD --- */
        body.keyboard-open .card {
            height: 100%;
            border-radius: 16px;
            box-shadow: none;
        }

        body.keyboard-open .card-inner {
            padding: 12px 16px;
            justify-content: center;
            gap: 12px;
        }

        body.keyboard-open .logo-row,
        body.keyboard-open #status-light,
        body.keyboard-open .social-container,
        body.keyboard-open .footer-clean {
            display: none !important;
        }

        body.keyboard-open .content.active {
            gap: 12px;
        }

        body.keyboard-open .money-input-box input {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

<div class="card money-app" id="mainCard">
    <div class="card-inner">
        
        <div class="logo-row">
            <h1>ᗩᗰᕮᑎ</h1>
            <div class="agent-title">
                <span class="clr-mobile">M</span><span class="clr-mobile">O</span><span class="clr-mobile">B</span><span class="clr-mobile">I</span><span class="clr-mobile">L</span><span class="clr-mobile">E</span><span class="clr-money">M</span><span class="clr-money">O</span><span class="clr-money">N</span><span class="clr-money">E</span><span class="clr-money">Y</span><span class="clr-agent">A</span><span class="clr-agent">G</span><span class="clr-agent">E</span><span class="clr-agent">N</span><span class="clr-agent">T</span>
            </div>
        </div>
        
        <div id="status-light"></div>
        
        <div class="tabs">
            <div class="tab active" onclick="openTab(event, 'buy')">THB to MMK</div>
            <div class="tab" onclick="openTab(event, 'sell')">MMK to THB</div>
        </div>

        <div class="inputs-container">
            <div id="buy" class="content active">
                <div>
                    <label>Amount {THB}</label>
                    <div class="money-input-box"><input type="text" id="thbBuy" placeholder="0" inputmode="decimal"></div>
                </div>
                <div>
                    <label>Amount {MMK}</label>
                    <div class="money-input-box"><input type="text" id="mmkBuy" placeholder="0" inputmode="decimal"></div>
                </div>
            </div>
            
            <div id="sell" class="content">
                <div>
                    <label>Amount {MMK}</label>
                    <div class="money-input-box"><input type="text" id="mmkSell" placeholder="0" inputmode="decimal"></div>
                </div>
                <div>
                    <label>Amount {THB}</label>
                    <div class="money-input-box"><input type="text" id="thbSell" placeholder="0" inputmode="decimal"></div>
                </div>
            </div>
        </div>

        <div class="social-container">
            <a href="https://m.me/MobileMoneyAgent" class="social-icon messenger"><i class="fa-brands fa-facebook-messenger"></i></a>
            <a href="viber://chat?number=%2B66947841411" class="social-icon viber"><i class="fa-brands fa-viber"></i></a>
            <a href="https://t.me/amenmobilemoneyagent" class="social-icon telegram"><i class="fa-brands fa-telegram"></i></a>
            <a href="https://api.whatsapp.com/send?phone=66947841411" class="social-icon whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="https://line.me/ti/p/~mobilemoneyagent" class="social-icon line"><i class="fa-brands fa-line"></i></a>
        </div>

        <span class="footer-clean">Mobile Money Agent © 2026</span>

    </div>
</div>

<script>
    const MONEY_API = 'https://script.google.com/macros/s/AKfycbzELl1tVZ-b5nDWUmqdb1j13Vo_SSlSYUdPhL0NO9zfmRC0mZmqA8X9BEmFHoIk-faTYQ/exec';
    let SETTINGS = { buyBase: 780, sellBase: 760 };
    let lastActiveInput = null;
    let apiOnline = true;

    function handleViewportChange() {
        if (window.visualViewport) {
            const vv = window.visualViewport;
            document.documentElement.style.setProperty('--vv-height', `${vv.height}px`);
            
            if (window.innerHeight - vv.height > 140) {
                document.body.classList.add('keyboard-open');
            } else {
                document.body.classList.remove('keyboard-open');
            }
        } else {
            document.documentElement.style.setProperty('--vv-height', `${window.innerHeight}px`);
        }
    }

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', handleViewportChange);
        window.visualViewport.addEventListener('scroll', handleViewportChange);
    }
    window.addEventListener('resize', handleViewportChange);
    window.addEventListener('load', handleViewportChange);

    function updateLiveClock() {
        const now = new Date();
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const dayName = days[now.getDay()];
        
        const dd = String(now.getDate()).padStart(2, '0');
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const yy = String(now.getFullYear()).slice(-2);
        const hh = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        
        const statusLight = document.getElementById('status-light');
        const clockColor = apiOnline ? '#0d9488' : '#e11d48';

        statusLight.innerHTML = `
            <div class="clock-time" style="color: ${clockColor};">${hh}:${min}:${ss}</div>
            <div class="clock-date">${dayName} ${dd},${mm},${yy}</div>
        `;
    }

    async function syncMoneyData() {
        try {
            const res = await fetch(`${MONEY_API}?cache=${Date.now()}`);
            const data = await res.json();
            apiOnline = true;
            let isRateChanged = false;
            if (data.buyBase && parseFloat(data.buyBase) !== SETTINGS.buyBase) { SETTINGS.buyBase = parseFloat(data.buyBase); isRateChanged = true; }
            if (data.sellBase && parseFloat(data.sellBase) !== SETTINGS.sellBase) { SETTINGS.sellBase = parseFloat(data.sellBase); isRateChanged = true; }
            if (isRateChanged && lastActiveInput) { lastActiveInput.dispatchEvent(new Event('input')); }
        } catch (e) {
            apiOnline = false;
        }
    }

    updateLiveClock();
    setInterval(updateLiveClock, 1000);
    
    syncMoneyData(); 
    setInterval(syncMoneyData, 1000);

    const format = (v, isTyping = false) => {
        if (!v && v !== 0) return "";
        let parts = v.toString().split(".");
        parts[0] = parts[0].replace(/,/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        if (parts.length > 1) return parts[0] + "." + parts[1];
        return parts[0] + (isTyping && v.toString().includes(".") ? "." : "");
    };
    const raw = (v) => parseFloat(v.toString().replace(/,/g, "")) || 0;

    function getSmoothMultiplier(mmkAmount, isBuyTab) {
        let percentage = 1.0;
        if (mmkAmount <= 100000) percentage = 1.0;
        else if (mmkAmount >= 150000000) percentage = 0.25;
        else {
            let ratio = (mmkAmount - 100000) / (150000000 - 100000);
            percentage = 1.0 - (ratio * (1.0 - 0.25));
        }
        return isBuyTab ? (1.0 + (percentage/100)) : (1.0 - (percentage/100));
    }

    function updateGlow(inputEl, hasValue) {
        let parentContent = inputEl.closest('.content');
        if (parentContent) {
            parentContent.querySelectorAll('.money-input-box').forEach(box => {
                hasValue ? box.classList.add('highlighted') : box.classList.remove('highlighted');
            });
        }
    }
    
    function handleTHBInput(inputEl, outputId, baseRate, isBuy) {
        lastActiveInput = inputEl; let thb = raw(inputEl.value); 
        inputEl.value = format(inputEl.value, true);
        if (!inputEl.value) { document.getElementById(outputId).value = ""; updateGlow(inputEl, false); return; }
        updateGlow(inputEl, true);
        let roughMMK = (thb / baseRate) * 100000;
        let baseTHB = thb / getSmoothMultiplier(roughMMK, isBuy);
        document.getElementById(outputId).value = format(Math.floor((baseTHB / baseRate) * 100000));
    }

    function handleMMKInput(inputEl, outputId, baseRate, isBuy) {
        lastActiveInput = inputEl; let mmk = raw(inputEl.value); 
        inputEl.value = format(inputEl.value, true);
        if (!inputEl.value) { document.getElementById(outputId).value = ""; updateGlow(inputEl, false); return; }
        updateGlow(inputEl, true);
        let baseTHB = (mmk / 100000) * baseRate;
        document.getElementById(outputId).value = format(parseFloat((baseTHB * getSmoothMultiplier(mmk, isBuy)).toFixed(2)));
    }

    document.getElementById('thbBuy').oninput = function() { handleTHBInput(this, 'mmkBuy', SETTINGS.buyBase, true); };
    document.getElementById('mmkBuy').oninput = function() { handleMMKInput(this, 'thbBuy', SETTINGS.buyBase, true); };
    document.getElementById('mmkSell').oninput = function() { handleMMKInput(this, 'thbSell', SETTINGS.sellBase, false); };
    document.getElementById('thbSell').oninput = function() { handleTHBInput(this, 'mmkSell', SETTINGS.sellBase, false); };

    function openTab(e, name) {
        document.querySelectorAll('.content').forEach(c => { c.classList.remove('active'); c.querySelectorAll('.money-input-box').forEach(b => b.classList.remove('highlighted')); });
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        e.currentTarget.classList.add('active');
        lastActiveInput = null;
    }
</script>
</body>
</html>
